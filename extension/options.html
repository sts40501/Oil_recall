<!doctype html>
<html lang="zh-Hant-TW">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>E-Recall 擴充功能設定</title><link rel="stylesheet" href="extension.css"></head>
  <body class="settings-page">
    <main class="settings-card">
      <p class="eyebrow">E-RECALL EXTENSION</p>
      <h1>服務設定</h1>
      <p>請填入已部署並啟用 Netlify Identity 的網站網址。此網址不是 APIKey，擴充功能不會儲存財政部憑證。</p>
      <form id="settings-form">
        <label for="service-origin">Netlify 網站網址</label>
        <input id="service-origin" type="url" placeholder="https://your-site.netlify.app" required>
        <button type="submit">儲存並授權連線</button>
      </form>
      <p id="settings-status" class="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
