<!doctype html>
<html lang="zh-Hant-TW">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>E-Recall 發票頁面比對</title><link rel="stylesheet" href="extension.css"></head>
  <body>
    <main class="app-shell">
      <header><div><p class="eyebrow">PRIVATE · LOCAL MATCHING</p><h1>E-Recall 發票頁面比對</h1></div></header>
      <section class="card"><h2>使用方式</h2><p>請自行前往官方電子發票平台登入、完成驗證並開啟發票明細頁。接著點選瀏覽器工具列的 E-Recall 圖示，即會只在本機讀取目前頁面文字並比對。</p><button id="open-official">開啟官方電子發票平台</button></section>
      <section class="card"><h2>隱私保護</h2><p>擴充功能不提供登入欄位、不讀取密碼、不保存 cookie，也不對財政部網站發出查詢請求。資料只在目前頁面與內建回收清單間本機比對。</p></section>
      <footer>官方資料：食藥署公告與泰山 115/07/12 公開流向。流向資料不代表所有商品皆受影響，請核對品名、店家與批號。</footer>
    </main>
    <script src="dashboard.js"></script>
  </body>
</html>
