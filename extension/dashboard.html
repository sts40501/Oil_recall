<!doctype html>
<html lang="zh-Hant-TW">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>E-Recall 發票頁面比對</title><link rel="stylesheet" href="extension.css"></head>
  <body>
    <main class="app-shell">
      <header><div><p class="eyebrow">PRIVATE · LOCAL MATCHING</p><h1>E-Recall 發票頁面比對</h1></div></header>
      <section class="card"><h2>使用方式</h2><p>點擊工具列 E-Recall 圖示後會導向官方「發票查詢及捐贈」頁。請自行登入、完成官方驗證與月份查詢；查詢結果出現後，擴充功能會改為每頁 100 筆、全選並下載各頁 CSV。</p><button id="open-official">開啟官方發票查詢頁</button></section>
      <section class="card"><h2>隱私保護</h2><p>擴充功能不讀取帳號、密碼或 cookie，也不繞過官方驗證。CSV 只下載到你的電腦；不會自動上傳，請自行拖曳至 E-Recall 網站進行本機比對。</p></section>
      <footer>官方資料：食藥署公告與泰山 115/07/12 公開流向。流向資料不代表所有商品皆受影響，請核對品名、店家與批號。</footer>
    </main>
    <script src="dashboard.js"></script>
  </body>
</html>
